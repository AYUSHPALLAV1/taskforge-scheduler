name: TaskForge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ===============================
  # LINT
  # ===============================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run lint --if-present

  # ===============================
  # UNIT TESTS
  # ===============================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @taskforge/api run test --passWithNoTests --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: apps/api/coverage

  # ===============================
  # INTEGRATION TESTS (needs real DB/Redis)
  # ===============================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL_POOLED }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ci-test-secret-at-least-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @taskforge/db run migrate
      - name: Run integration tests
        run: pnpm --filter @taskforge/api run test:e2e --passWithNoTests

  # ===============================
  # BUILD
  # ===============================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @taskforge/api run build
      - run: pnpm --filter @taskforge/web run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  # ===============================
  # DEPLOY (main branch only)
  # ===============================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy (API)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
      - name: Trigger Vercel Deploy (Web)
        run: |
          curl -X POST "https://api.vercel.com/v1/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"taskforge-web","gitSource":{"type":"github","repoId":"${{ github.repository_id }}","ref":"main"}}'
